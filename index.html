<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/main.css" rel="stylesheet">
    <link href="/css/materialize.css" rel="stylesheet">
    <link href="/css/material-icons.css" rel="stylesheet">
    <title>Rawir's Page</title>

</head>
<body>
    <div class="background-blur"></div>

    <div class="container">

      <!-- Sidebar -->
      <ul id="slide-out" class="sidenav grey darken-4">
        <li>
          <div class="user-view">
            <div class="background" style="filter: brightness(0.8)">
              <img style="width: 100%; height: 100%; filter: blur(4px)" src="https://2.bp.blogspot.com/-56HtTfun4iU/XFYaXOoerLI/AAAAAAAAHRc/cMrgZKA7OTgJVEKjEawMv7IRHnA5DJLUgCLcBGAs/w1200-h630-p-k-no-nu/purple_wilderness-1920x1080.jpg">
            </div>

            <a><img class="circle" src="https://github.com/Rawiros.png"></a>
            <a><span class="white-text name">Rawir</span></a>
            <a href="https://github.com/Rawiros" target="_blank"><span class="white-text email">https://github.com/Rawiros</span></a>
          </div>
        </li>

        <li projects><a class="modal-trigger" href="#projects"><i class="material-icons">power</i><span>Projects</span></a></li>
        <li github><a target="_blank" href="https://github.com/Rawiros"><i class="material-icons">folder</i><span>Github</span></a></li>
     </ul>

     <!-- Projects Modal -->
     <div id="projects" class="modal modal-fixed-footer darken-4 grey">
       <div class="modal-content grey darken-4 white-text projects-list">
         <h4>Projects</h4>          
       </div>
     </div>

     <!-- Action Btn -->
     <div class="fixed-action-btn">
       <a data-target="slide-out" class="btn-floating btn-large sidenav-trigger blue">
         <i class="large material-icons">house</i>
       </a>
     </div>

     <!-- Card With "About Me" etc. -->
    <div class="col s10 m7">
      <div class="card grey darken-4">
        <div class="card-content white-text">
          <span class="card-title center-align">About Me</span>

           <div class="row">

            <!-- Github Avatar -->
             <div class="col s3 avatar">
               <img class="circle responsive-img" src="https://github.com/Rawiros.png"></img>
             </div>

            <!-- Dialog Main Content -->
            <div class="col s8">

              <p class="flow-text">Hi! My name is <strong>Łukasz</strong></p>
              <p>I'm full stack developer from Poland for two years, and I love doing stuff in <a target="_blank" href="https://wikipedia.org/wiki/Node.js">Node.JS</a></p>
              
              <div> <!-- Some Info -->
                <info icon="person" tooltip="First Name" name="First Name">Łukasz</info>
                <info icon="dns" tooltip="Development" name="Development">Full Stack</info>
                <info icon="event" tooltip="Age" name="Age"></info>
                <info icon="apartment" tooltip="City" name="City">Poland, Włocławek</info>
                <info icon="pets" tooltip="In Furry Fandom" name="In Furry Fandom">For </info>
              
                <!-- Contact -->
                <info icon="chat" tooltip="Contact" name="Contact">
                  <a target="_blank" href="https://discord.com/users/824029986792931328">Discord</a>
                  <a target="_blank" href="https://t.me/x4d3a">Telegram</a>
                </info>
              </div>

            </div> <!-- Close Dialog Main Content Div -->
           </div> <!-- Close Row Div -->
        </div> <!-- Close Card Content Div -->
      </div> <!-- Close Card Div -->
    </div> <!-- Close Column Div -->
    </div> <!-- Close Container Div -->

    <script src="/js/materialize.min.js" type="text/javascript"></script>
    <script src="/js/index.js" type="text/javascript"></script>
</body>
</html>
